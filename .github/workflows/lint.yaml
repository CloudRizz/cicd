name: Basic CI Pipeline

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code 
        uses: actions/checkout@v4

      - name: Set up Python 
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install flake8 
        run: |
          python -m pip install --upgrade pip
          pip install flake8 # if in requirements.txt, you can use pip install -r requirements.txt

    
      - name: Run linting
        run: flake8 app